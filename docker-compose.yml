services:
  postgres:
    image: postgres:15
    container-name: postgress-pcbuilder
    environment: 
      POSTRGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pcbuilder
    ports:
      - "5432": "5432"
    volumes:
      - postgres_data: /var/lib/postgresql/data      
volumes
  postgres_data
